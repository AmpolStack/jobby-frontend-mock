<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobby ERP - Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="css/brand.css">
</head>

<body
  style="background: var(--surface); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;">

  <div class="card"
    style="width: 100%; max-width: 400px; padding: 40px; text-align: center; box-shadow: var(--shadow-lg);">
    <div style="margin-bottom: 30px;">
      <div class="logo-mark"
        style="width: 48px; height: 48px; font-size: 1.5rem; margin: 0 auto 12px; background: var(--primary); color: white;">
        J</div>
      <h1 style="font-size: 1.8rem; letter-spacing: -0.03em; color: var(--text);">Welcome back</h1>
      <p style="color: var(--muted); font-size: 0.95rem; margin-top: 6px;">Sign in to your Jobby ERP</p>
    </div>

    <form style="display: flex; flex-direction: column; gap: 18px; text-align: left;"
      onsubmit="event.preventDefault(); window.location.href='pages/home.html';">
      <div class="form-group">
        <label for="login-email">Email Address</label>
        <input type="email" id="login-email" class="brand-input" placeholder="name@company.com" required>
      </div>

      <div class="form-group">
        <div style="display: flex; justify-content: space-between; align-items: baseline;">
          <label for="login-password">Password</label>
          <a href="#" style="font-size: 0.74rem; font-weight: 700; color: var(--primary); text-decoration: none;">Forgot
            password?</a>
        </div>
        <input type="password" id="login-password" class="brand-input" placeholder="••••••••" required>
      </div>

      <button type="submit" class="cta"
        style="width: 100%; justify-content: center; margin-top: 8px; padding: 12px; font-size: 1rem;">Sign In</button>
    </form>

    <div style="margin-top: 30px; font-size: 0.9rem; color: var(--text-secondary);">
      Don't have an account? <a href="pages/register.html"
        style="color: var(--primary); font-weight: 700; text-decoration: none;">Create Owner</a>
    </div>
  </div>

</body>

</html>
